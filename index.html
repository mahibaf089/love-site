<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #89f7fe, #66a6ff);
    color: white;
    text-align: center;
    overflow: hidden;
}

.container {
    padding: 20px;
}

/* 💖 Name animation */
.name {
    font-size: 36px;
    font-weight: bold;
    animation: glow 2s ease-in-out infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px white; }
    to { text-shadow: 0 0 25px white, 0 0 40px #fff; }
}

/* 🌸 Card */
.card {
    background: rgba(255,255,255,0.2);
    margin: 20px auto;
    padding: 20px;
    border-radius: 15px;
    width: 85%;
    backdrop-filter: blur(10px);
}

/* ✨ Typing text */
#typingText {
    font-size: 18px;
    white-space: pre-line;
    border-right: 2px solid white;
    display: inline-block;
    padding-right: 5px;
}

/* 🌟 Particles */
.particles {
    position: fixed;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.particle {
    position: absolute;
    width: 6px;
    height: 6px;
    background: white;
    border-radius: 50%;
    opacity: 0.7;
    animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(100vh); opacity: 0; }
    50% { opacity: 1; }
    100% { transform: translateY(-10vh); opacity: 0; }
}

img {
    width: 90%;
    max-width: 350px;
    border-radius: 15px;
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="particles"></div>

<div class="container">

    <!-- 💖 Name -->
    <div class="name">Megla 💖</div>

    <div class="card">
        <p id="typingText"></p>
        <img src="your-photo.jpg" alt="Memory">
    </div>

</div>

<audio id="bgMusic" loop>
    <source src="romantic.mp3" type="audio/mpeg">
</audio>

<script>
// 💌 Caring message with typing effect
const text = `Megla, 💖

I know you’re not feeling well right now…  
and I wish I could be there beside you.

Please take rest and don’t worry about anything.  
You mean so much to me, and seeing you unwell hurts me too.

I’m always here for you…  
sending you all my love, warmth, and prayers 🤍

You will be fine very soon, I believe in you.  
Get well soon, my dear 💕`;

let i = 0;
function typeEffect() {
    if (i < text.length) {
        document.getElementById("typingText").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeEffect, 40);
    }
}
typeEffect();

// 🌟 Particles
function createParticle() {
    const p = document.createElement("div");
    p.classList.add("particle");

    p.style.left = Math.random() * 100 + "vw";
    p.style.animationDuration = (Math.random() * 3 + 3) + "s";

    document.querySelector(".particles").appendChild(p);

    setTimeout(() => p.remove(), 6000);
}
setInterval(createParticle, 200);

// 🎵 Music on first click
let played = false;
document.addEventListener("click", () => {
    if (!played) {
        document.getElementById("bgMusic").play();
        played = true;
    }
});
</script>

</body>
</html>
